spring.application.name=vexspend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vexspend}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

security.jwt.secret=${JWT_SECRET_BASE64:V3hiSG5yRjMvQnJNNjVJQ3M4K0l2MW9FcHh6dnVYUW9QY2Q4U2JmVGRzY0E3VDVZQ2h3Q2F5V0dFNjBWWFMyOA==}
security.jwt.issuer=${JWT_ISSUER:vexspend-api}
security.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:60}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
